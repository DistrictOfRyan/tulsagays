    position: relative;
  }
  .opt1 .frame::before {
    content: '';
    position: absolute;
    top: 8px; left: 8px; right: 8px; bottom: 8px;
    border: 1px solid rgba(107,91,149,0.35);
  }
  .opt1 .frame::after {
    content: '';
    position: absolute;
    top: -8px; left: -8px; right: -8px; bottom: -8px;
    border: 1px solid rgba(107,91,149,0.15);

    font-size: 16px; color: #C4A7A0; letter-spacing: 8px;
    text-transform: uppercase; font-weight: 600;
  }

    gap: 16px; margin: 14px 0;
  }
  .opt1 .deco-row::before, .opt1 .deco-row::after {
    content: ''; width: 100px; height: 1px; background: #6B5B95;
  }
  .opt1 .diamond { width: 8px; height: 8px; background: #6B5B95; transform: rotate(45deg); }
  .opt1 .title-1 {
    font-family: Impact, 'Arial Black', sans-serif;
    font-size: 80px; color: #6B5B95; letter-spacing: 6px; line-height: 1;
  }
  .opt1 .title-2 {
    font-family: Impact, 'Arial Black', sans-serif;
    font-size: 80px; color: #C4A7A0; letter-spacing: 6px; line-height: 1; margin-top: 2px;

  .opt1 .sub {
    font-size: 18px; color: #E8DDD3; letter-spacing: 5px;
    font-weight: 300; margin-top: 8px;
  }

<div class="nav-controls">
  <button onclick="nav(-1)">PREV</button>
  <span id="counter">1: Midnight Violet</span>
  <button onclick="nav(1)">NEXT</button>
</div>

<script>
let c = 1;
const labels = ['1: Midnight Violet', '2: Steel & Rose', '3: Navy & Silver', '4: Emerald & Blush'];
function nav(d) {
  document.getElementById('logo-'+c).classList.remove('active');
  c = Math.max(1, Math.min(4, c+d));
  document.getElementById('logo-'+c).classList.add('active');
  document.getElementById('counter').textContent = labels[c-1];
}
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nav(1);
  if (e.key === 'ArrowLeft') nav(-1);
});
</script>
