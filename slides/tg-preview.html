<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tulsa Gays — Poiret One White+Pink Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .logo {
    width: 800px;
    height: 800px;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  .tg {
    font-family: 'Poiret One', sans-serif;
    font-size: 180px;
    letter-spacing: 10px;
    line-height: 1;
    -webkit-text-stroke: 2.5px;
  }
  .t-letter { color: #FFFFFF; -webkit-text-stroke-color: #FFFFFF; }
  .g-letter { color: #9B1E5F; -webkit-text-stroke-color: #9B1E5F; }
  .full-name .g-letter { -webkit-text-stroke: 2px #9B1E5F; }
  .full-name {
    font-family: 'Poiret One', sans-serif;
    font-size: 52px;
    letter-spacing: 8px;
    -webkit-text-stroke: 1.2px;
    margin-top: 4px;
  }
  .bar {
    height: 3px;
    width: 380px;
    background: #9B1E5F;
    margin: 16px auto;
  }
  .tagline {
    font-family: 'Segoe UI', sans-serif;
    font-size: 16px;
    color: #ffffff;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: 600;
    font-size: 18px;
    margin-top: 12px;
  }
</style>
</head>
<body>
<div class="logo">
  <div class="tg"><span class="t-letter">T</span><span class="g-letter">G</span></div>
  <div class="full-name"><span class="t-letter">TULSA</span> <span class="g-letter">GAYS</span></div>
  <div class="bar"></div>
  <div class="tagline">Tulsa's queer event guide.</div>
</div>
</body>
</html>
