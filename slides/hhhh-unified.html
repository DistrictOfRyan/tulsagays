<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HHHH Unified Logo System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #222; font-family: 'Segoe UI', system-ui, sans-serif; }

  .logo {
    width: 800px;
    height: 800px;
    position: relative;
    overflow: hidden;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: #0a0a0a;
  }
  .logo.active { display: flex; }

  /* ─── SHARED SKYLINE ─── */
  .skyline {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 3px;
  }
  .bldg {
    background: #141414;
    border-top: 1px solid rgba(139,114,52,0.25);
  }

  /* ─── A: FULL BANNER (Option 1 refined + time) ─── */
  .logo-a {
    background:
      radial-gradient(ellipse at 50% 40%, rgba(139,114,52,0.08) 0%, transparent 60%),
      #0a0a0a;
  }
  .logo-a .frame {
    border: 2px solid #8B7234;
    padding: 50px 60px;
    position: relative;
  }
  .logo-a .frame::before {
    content: '';
    position: absolute;
    top: 8px; left: 8px; right: 8px; bottom: 8px;
    border: 1px solid rgba(139,114,52,0.35);
  }
  .logo-a .frame::after {
    content: '';
    position: absolute;
    top: -8px; left: -8px; right: -8px; bottom: -8px;
    border: 1px solid rgba(139,114,52,0.15);
  }
  .logo-a .first-friday {
    font-size: 16px;
    color: #BF5700;
    letter-spacing: 8px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .logo-a .deco-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin: 14px 0;
  }
  .logo-a .deco-row::before, .logo-a .deco-row::after {
    content: '';
    width: 100px;
    height: 1px;
    background: #8B7234;
  }
  .logo-a .diamond {
    width: 8px; height: 8px;
    background: #8B7234;
    transform: rotate(45deg);
  }
  .logo-a .homo-hotel {
    font-family: Impact, 'Arial Black', sans-serif;
    font-size: 72px;
    color: #8B7234;
    letter-spacing: 6px;
    line-height: 1;
  }
  .logo-a .happy-hour {
    font-family: Impact, 'Arial Black', sans-serif;
    font-size: 72px;
    color: #00838F;
    letter-spacing: 6px;
    line-height: 1;
    margin-top: 2px;
  }
  .logo-a .time-line {
    font-size: 22px;
    color: #F5E6C8;
    letter-spacing: 5px;
    font-weight: 300;
    margin-top: 4px;
  }
  .logo-a .tulsa-line {
    font-size: 15px;
    color: #999;
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .logo-a .skyline { height: 130px; padding: 0 60px; }

  /* ─── B: CIRCLE PROFILE PIC (Option 2 refined with 1+5 DNA) ─── */
  .logo-b {
    background: #0a0a0a;
  }
  .logo-b .circle {
    width: 560px;
    height: 560px;
    border-radius: 50%;
    border: 3px solid #8B7234;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  .logo-b .circle::before {
    content: '';
    position: absolute;
    top: 10px; left: 10px; right: 10px; bottom: 10px;
    border-radius: 50%;
    border: 1px solid rgba(139,114,52,0.3);
  }
  /* Four H grid inside circle */
  .logo-b .four-h {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }
  .logo-b .h-letter {
    font-family: Impact, 'Arial Black', sans-serif;
    font-size: 80px;
    width: 100px;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    border: 2px solid;
  }
  .logo-b .h1 { color: #BF5700; border-color: rgba(191,87,0,0.6); }
  .logo-b .h2 { color: #8B7234; border-color: rgba(139,114,52,0.6); }
  .logo-b .h3 { color: #00838F; border-color: rgba(0,131,143,0.6); }
  .logo-b .h4 { color: #A89050; border-color: rgba(168,144,80,0.6); }
  .logo-b .sub-text {
    font-size: 13px;
    color: #F5E6C8;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 400;
  }
  .logo-b .sub-city {
    font-size: 11px;
    color: #00838F;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 6px;
  }
  /* Skyline at bottom of circle */
  .logo-b .circle-skyline {
    position: absolute;
    bottom: 20px; left: 40px; right: 40px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 2px;
  }
  .logo-b .cs {
    background: rgba(139,114,52,0.12);
    border-top: 1px solid rgba(139,114,52,0.25);
  }

  /* ─── C: SQUARE MARK (Option 5 refined, better readability) ─── */
  .logo-c {
    background: #0a0a0a;
  }
  .logo-c .grid-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  .logo-c .four-h {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .logo-c .h-letter {
    font-family: Impact, 'Arial Black', sans-serif;
    font-size: 120px;
    width: 150px;
    height: 150px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    border: 2px solid;
  }
  .logo-c .h1 { color: #BF5700; border-color: #BF5700; }
  .logo-c .h2 { color: #8B7234; border-color: #8B7234; }
  .logo-c .h3 { color: #00838F; border-color: #00838F; }
  .logo-c .h4 { color: #A89050; border-color: #A89050; }
  .logo-c .words {
    display: flex;
    gap: 20px;
    align-items: center;
  }
  .logo-c .word {
    font-size: 16px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .logo-c .w1 { color: #BF5700; }
  .logo-c .w2 { color: #8B7234; }
  .logo-c .w3 { color: #00838F; }
  .logo-c .w4 { color: #A89050; }
  .logo-c .dot-sep {
    color: #555;
    font-size: 8px;
  }
  .logo-c .city {
    font-size: 18px;
    color: #F5E6C8;
    letter-spacing: 6px;
    text-transform: uppercase;
    font-weight: 300;
    margin-top: 4px;
  }
  .logo-c .time-sub {
    font-size: 14px;
    color: #999;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .logo-c .skyline { height: 100px; padding: 0 120px; }

  /* ─── D: SYSTEM OVERVIEW ─── */
  .logo-d {
    background: #0a0a0a;
    padding: 40px;
    gap: 20px;
    justify-content: flex-start;
    padding-top: 30px;
  }
  .logo-d .sys-title {
    font-family: Impact, 'Arial Black', sans-serif;
    font-size: 28px;
    color: #8B7234;
    letter-spacing: 4px;
    margin-bottom: 10px;
  }
  .logo-d .sys-row {
    display: flex;
    gap: 24px;
    align-items: center;
    width: 100%;
    padding: 16px 0;
    border-bottom: 1px solid #1a1a1a;
  }
  .logo-d .sys-label {
    min-width: 200px;
    font-size: 14px;
    color: #999;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: right;
  }
  .logo-d .sys-preview {
    flex: 1;
    display: flex;
    justify-content: center;
  }
  /* Mini versions */
  .logo-d .mini-frame {
    border: 1px solid #8B7234;
    padding: 12px 20px;
    text-align: center;
    position: relative;
  }
  .logo-d .mini-frame::before {
    content: '';
    position: absolute;
    top: 4px; left: 4px; right: 4px; bottom: 4px;
    border: 1px solid rgba(139,114,52,0.3);
  }
  .logo-d .mini-title {
    font-family: Impact, 'Arial Black', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    line-height: 1.1;
  }
  .logo-d .mini-gold { color: #8B7234; }
  .logo-d .mini-peacock { color: #00838F; }
  .logo-d .mini-sub {
    font-size: 9px;
    color: #999;
    letter-spacing: 3px;
    margin-top: 4px;
  }

  .logo-d .mini-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 2px solid #8B7234;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  .logo-d .mini-4h {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
  }
  .logo-d .mini-h {
    font-family: Impact, sans-serif;
    font-size: 22px;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid;
  }

  .logo-d .mini-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
  }
  .logo-d .mini-gh {
    font-family: Impact, sans-serif;
    font-size: 32px;
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid;
  }

  /* Nav */
  .nav-controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 100;
    background: rgba(0,0,0,0.9);
    padding: 12px 24px;
    border: 1px solid #8B7234;
  }
  .nav-controls button {
    background: #8B7234;
    color: #0a0a0a;
    border: none;
    padding: 8px 20px;
    font-weight: 700;
    cursor: pointer;
  }
  .nav-controls span {
    color: #F5E6C8;
    display: flex;
    align-items: center;
    font-size: 14px;
    min-width: 140px;
    justify-content: center;
  }
</style>
</head>
<body>

<!-- A: FULL BANNER -->
<div class="logo logo-a active" id="logo-1">
  <div class="frame">
    <div class="first-friday">First Friday</div>
    <div class="deco-row"><div class="diamond"></div></div>
    <div class="homo-hotel">HOMO HOTEL</div>
    <div class="happy-hour">HAPPY HOUR</div>
    <div class="time-line">6 &ndash; 8 PM</div>
    <div class="deco-row"><div class="diamond"></div></div>
    <div class="tulsa-line">Tulsa, Oklahoma</div>
  </div>
  <div class="skyline" style="height:130px;padding:0 60px">
    <div class="bldg" style="width:20px;height:40px"></div>
    <div class="bldg" style="width:14px;height:60px"></div>
    <div class="bldg" style="width:22px;height:30px"></div>
    <div class="bldg" style="width:12px;height:85px"></div>
    <div class="bldg" style="width:18px;height:45px"></div>
    <div class="bldg" style="width:28px;height:110px"></div>
    <div class="bldg" style="width:16px;height:55px"></div>
    <div class="bldg" style="width:24px;height:125px"></div>
    <div class="bldg" style="width:14px;height:70px"></div>
    <div class="bldg" style="width:20px;height:95px"></div>
    <div class="bldg" style="width:16px;height:50px"></div>
    <div class="bldg" style="width:22px;height:75px"></div>
    <div class="bldg" style="width:14px;height:35px"></div>
    <div class="bldg" style="width:18px;height:60px"></div>
    <div class="bldg" style="width:20px;height:45px"></div>
  </div>
</div>

<!-- B: CIRCLE PROFILE PIC -->
<div class="logo logo-b" id="logo-2">
  <div class="circle">
    <div class="four-h">
      <div class="h-letter h1">H</div>
      <div class="h-letter h2">H</div>
      <div class="h-letter h3">H</div>
      <div class="h-letter h4">H</div>
    </div>
    <div class="sub-text">Homo Hotel Happy Hour</div>
    <div class="sub-city">First Fridays &middot; Tulsa</div>
    <div class="circle-skyline">
      <div class="cs" style="width:10px;height:18px"></div>
      <div class="cs" style="width:8px;height:30px"></div>
      <div class="cs" style="width:12px;height:15px"></div>
      <div class="cs" style="width:7px;height:42px"></div>
      <div class="cs" style="width:10px;height:25px"></div>
      <div class="cs" style="width:14px;height:55px"></div>
      <div class="cs" style="width:9px;height:32px"></div>
      <div class="cs" style="width:12px;height:20px"></div>
      <div class="cs" style="width:8px;height:38px"></div>
      <div class="cs" style="width:10px;height:22px"></div>
    </div>
  </div>
</div>

<!-- C: SQUARE MARK (improved readability) -->
<div class="logo logo-c" id="logo-3">
  <div class="grid-wrap">
    <div class="four-h">
      <div class="h-letter h1">H</div>
      <div class="h-letter h2">H</div>
      <div class="h-letter h3">H</div>
      <div class="h-letter h4">H</div>
    </div>
    <div class="words">
      <span class="word w1">HOMO</span>
      <span class="dot-sep">&bull;</span>
      <span class="word w2">HOTEL</span>
      <span class="dot-sep">&bull;</span>
      <span class="word w3">HAPPY</span>
      <span class="dot-sep">&bull;</span>
      <span class="word w4">HOUR</span>
    </div>
    <div class="city">Tulsa, Oklahoma</div>
    <div class="time-sub">First Fridays &middot; 6 &ndash; 8 PM</div>
  </div>
  <div class="skyline" style="height:100px;padding:0 120px">
    <div class="bldg" style="width:14px;height:25px"></div>
    <div class="bldg" style="width:10px;height:40px"></div>
    <div class="bldg" style="width:16px;height:20px"></div>
    <div class="bldg" style="width:10px;height:55px"></div>
    <div class="bldg" style="width:14px;height:35px"></div>
    <div class="bldg" style="width:20px;height:70px"></div>
    <div class="bldg" style="width:12px;height:42px"></div>
    <div class="bldg" style="width:16px;height:28px"></div>
    <div class="bldg" style="width:10px;height:48px"></div>
    <div class="bldg" style="width:14px;height:30px"></div>
  </div>
</div>

<!-- D: CAMPY FUN -->
<div class="logo" id="logo-4" style="background:linear-gradient(180deg,#0a0a0a 0%,#120a14 100%);">
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
    <!-- Gold flamingo -->
    <svg width="50" height="60" viewBox="0 0 50 60" style="margin-bottom:4px;">
      <ellipse cx="25" cy="34" rx="12" ry="8" fill="#8B7234" opacity="0.9"/>
      <path d="M25,26 C25,26 28,20 28,14 C28,8 24,4 22,4 C20,4 18,6 20,8 L22,7" fill="none" stroke="#8B7234" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="22" cy="5" r="3.5" fill="#8B7234"/>
      <circle cx="21" cy="4.5" r="1" fill="#0a0a0a"/>
      <path d="M18.5,5.5 L15,6.5 L18.5,7" fill="#BF5700"/>
      <line x1="22" y1="42" x2="20" y2="56" stroke="#8B7234" stroke-width="2"/>
      <line x1="28" y1="42" x2="30" y2="56" stroke="#8B7234" stroke-width="2"/>
      <line x1="20" y1="56" x2="16" y2="56" stroke="#8B7234" stroke-width="1.5"/>
      <line x1="30" y1="56" x2="34" y2="56" stroke="#8B7234" stroke-width="1.5"/>
      <path d="M37,32 C34,30 33,34 36,35" fill="#A89050" opacity="0.7"/>
    </svg>
    <div style="font-family:Impact,'Arial Black',sans-serif;font-size:90px;letter-spacing:8px;line-height:1;">
      <span style="color:#BF5700">H</span><span style="color:#8B7234">O</span><span style="color:#00838F">M</span><span style="color:#A89050">O</span>
    </div>
    <div style="font-family:Impact,'Arial Black',sans-serif;font-size:90px;letter-spacing:8px;line-height:1;">
      <span style="color:#8B7234">H</span><span style="color:#00838F">O</span><span style="color:#BF5700">T</span><span style="color:#A89050">E</span><span style="color:#8B7234">L</span>
    </div>
    <div style="display:flex;align-items:center;gap:20px;margin:14px 0;">
      <span style="width:70px;height:1px;background:#8B7234;display:inline-block"></span>
      <!-- Gold flamingo divider -->
      <svg width="50" height="60" viewBox="0 0 50 60" style="flex-shrink:0;">
        <ellipse cx="25" cy="34" rx="12" ry="8" fill="#8B7234" opacity="0.9"/>
        <path d="M25,26 C25,26 28,20 28,14 C28,8 24,4 22,4 C20,4 18,6 20,8 L22,7" fill="none" stroke="#8B7234" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="22" cy="5" r="3.5" fill="#8B7234"/>
        <circle cx="21" cy="4.5" r="1" fill="#0a0a0a"/>
        <path d="M18.5,5.5 L15,6.5 L18.5,7" fill="#BF5700"/>
        <line x1="22" y1="42" x2="20" y2="56" stroke="#8B7234" stroke-width="2"/>
        <line x1="28" y1="42" x2="30" y2="56" stroke="#8B7234" stroke-width="2"/>
        <line x1="20" y1="56" x2="16" y2="56" stroke="#8B7234" stroke-width="1.5"/>
        <line x1="30" y1="56" x2="34" y2="56" stroke="#8B7234" stroke-width="1.5"/>
        <path d="M37,32 C34,30 33,34 36,35" fill="#A89050" opacity="0.7"/>
      </svg>
      <span style="width:70px;height:1px;background:#8B7234;display:inline-block"></span>
    </div>
    <div style="font-family:Impact,'Arial Black',sans-serif;font-size:56px;letter-spacing:6px;color:#F5E6C8;line-height:1;">HAPPY HOUR</div>
    <div style="font-size:20px;color:#00838F;letter-spacing:6px;font-weight:600;margin-top:10px;">FIRST FRIDAYS &middot; 6&ndash;8 PM</div>
    <div style="margin-top:14px;">
      <span style="font-size:20px;color:#F5E6C8;letter-spacing:5px;font-weight:300;">TULSA, OKLAHOMA</span>
    </div>
    <div style="font-size:18px;color:#A89050;letter-spacing:4px;margin-top:10px;font-weight:600;">THE QUEEREST HH IN T-TOWN</div>
  </div>
  <div class="skyline" style="height:110px;padding:0 80px">
    <div class="bldg" style="width:16px;height:30px"></div>
    <div class="bldg" style="width:12px;height:50px"></div>
    <div class="bldg" style="width:20px;height:25px"></div>
    <div class="bldg" style="width:10px;height:70px"></div>
    <div class="bldg" style="width:16px;height:40px"></div>
    <div class="bldg" style="width:24px;height:90px"></div>
    <div class="bldg" style="width:14px;height:50px"></div>
    <div class="bldg" style="width:18px;height:35px"></div>
    <div class="bldg" style="width:12px;height:55px"></div>
    <div class="bldg" style="width:16px;height:30px"></div>
  </div>
</div>

<div class="nav-controls">
  <button onclick="nav(-1)">PREV</button>
  <span id="counter">A: Full Banner</span>
  <button onclick="nav(1)">NEXT</button>
</div>

<script>
let c = 1;
const labels = ['A: Full Banner', 'B: Profile Pic', 'C: Square Mark', 'D: Campy Fun'];
function nav(d) {
  document.getElementById('logo-'+c).classList.remove('active');
  c = Math.max(1, Math.min(4, c+d));
  document.getElementById('logo-'+c).classList.add('active');
  document.getElementById('counter').textContent = labels[c-1];
}
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nav(1);
  if (e.key === 'ArrowLeft') nav(-1);
});
</script>
</body>
</html>
