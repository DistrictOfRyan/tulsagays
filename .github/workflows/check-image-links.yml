name: Check image links

on:
  push:
    paths:
      - "docs/**"
      - "tools/check_image_links.py"
      - ".github/workflows/check-image-links.yml"
  pull_request:
    paths:
      - "docs/**"
      - "tools/check_image_links.py"
      - ".github/workflows/check-image-links.yml"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify every <img src> resolves
        run: python tools/check_image_links.py
