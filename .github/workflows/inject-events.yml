name: Inject Community Events

on:
  push:
    paths:
      - 'content/community_events.json'
  workflow_dispatch:

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Inject community events into site
        run: python tools/inject_community_events.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet || git commit -m "Auto-inject community events [skip ci]"
          git push
